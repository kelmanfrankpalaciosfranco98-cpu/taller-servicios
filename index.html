<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTOCENTER VILLA HERMOSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos específicos para impresión y PDF */
        @media print {
            @page { margin: 0; width: 58mm; }
            body { 
                background: white !important; 
                color: black !important; 
            }
            .no-print { display: none !important; }
            #ticket-imprimir { 
                display: block !important; 
                width: 55mm !important;
                margin: 0;
                padding: 0;
                /* Evita que el navegador formatee los números */
                font-variant-numeric: tabular-nums;
            }
            * { visibility: hidden; }
            #ticket-imprimir, #ticket-imprimir * { visibility: visible; }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4">
    <div id="ticket-imprimir" class="hidden text-black bg-white" style="font-family: 'Courier New', Courier, monospace; line-height: 1.1;"></div>

    <script>
        // ... (Tus funciones de guardar y cargar se mantienen igual)

        function imprimirTicket(id) {
            const datos = JSON.parse(localStorage.getItem('taller_kelman'));
            const s = datos.find(d => d.id === id);
            const ticketArea = document.getElementById('ticket-imprimir');
            
            // Convertimos a String y limpiamos cualquier carácter invisible
            const proximoKmStr = String(s.proximoKm).replace(/\s/g, '');
            const kmEntradaStr = String(s.km).replace(/\s/g, '');
            const tel1 = "40884597";
            const tel2 = "47181430";

            ticketArea.innerHTML = `
                <div style="width: 100%; text-align: center; color: black !important; padding-top: 5px;">
                    <strong style="font-size: 16px; display: block;">MOTOCENTER</strong>
                    <strong style="font-size: 16px; display: block;">VILLA HERMOSA</strong>
                    <span style="font-size: 11px; display: block; margin-top: 2px;">Taller de servicios</span>
                    <span style="font-size: 11px; display: block; font-weight: bold;">Tel:${tel1}/${tel2}</span>
                    <span style="display: block; font-size: 10px;">============================</span>
                </div>
                <div style="font-size: 11px; padding: 0 2mm; color: black !important;">
                    <p style="margin: 3px 0;"><strong>FECHA:</strong> ${s.fecha}</p>
                    <p style="margin: 3px 0;"><strong>CLIENTE:</strong> ${s.cliente}</p>
                    <p style="margin: 3px 0;"><strong>TEL:</strong> ${s.telefono}</p>
                    <p style="margin: 3px 0;"><strong>MOTO:</strong> ${s.moto} [${s.placa}]</p>
                    <span style="display: block; font-size: 10px; text-align: center;">----------------------------</span>
                    <p style="margin: 3px 0;"><strong>TRABAJO REALIZADO:</strong><br>${s.trabajo}</p>
                    <span style="display: block; font-size: 10px; text-align: center;">----------------------------</span>
                    <p style="margin: 3px 0;"><strong>KM ENTRADA:</strong> ${kmEntradaStr}</p>
                    <div style="border: 1px dashed black; padding: 4px; margin-top: 5px; text-align: center;">
                        <strong>PROX.CAMBIO:${proximoKmStr}KM</strong>
                    </div>
                    <div style="text-align: right; margin-top: 10px; font-size: 15px;">
                        <strong>TOTAL:Q${s.precio}</strong>
                    </div>
                    <div style="text-align: center; margin-top: 15px; font-size: 9px;">
                        ¡Gracias por su confianza!<br>Vuelva pronto.
                    </div>
                    <div style="margin-top: 10px; color: white;">.</div>
                </div>
            `;
            
            setTimeout(() => {
                window.print();
            }, 600);
        }
        // ... (Resto de funciones iguales)
    </script>
</body>
</html>
