<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Motos - Kelman</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4">
    <div class="max-w-5xl mx-auto">
        <header class="py-6 border-b border-gray-700 mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-yellow-500">CONTROL DE TALLER 🛠️</h1>
                <p class="text-gray-400">Registro de servicios y cambios de aceite</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-gray-800 p-6 rounded-xl shadow-lg sticky top-4">
                    <h2 class="text-xl font-bold mb-4 text-white">Nuevo Servicio</h2>
                    <form id="tallerForm" class="space-y-4">
                        <input type="text" id="cliente" placeholder="Nombre del Cliente" required class="w-full bg-gray-700 p-3 rounded border-none focus:ring-2 focus:ring-yellow-500 text-white">
                        <input type="text" id="moto" placeholder="Moto (Ej: Pulsar NS 200)" required class="w-full bg-gray-700 p-3 rounded border-none focus:ring-2 focus:ring-yellow-500 text-white">
                        <input type="text" id="placa" placeholder="Placa / Matrícula" required class="w-full bg-gray-700 p-3 rounded border-none focus:ring-2 focus:ring-yellow-500 uppercase text-white">
                        <input type="number" id="km" placeholder="Kilometraje actual" required class="w-full bg-gray-700 p-3 rounded border-none focus:ring-2 focus:ring-yellow-500 text-white">
                        <textarea id="trabajo" placeholder="Descripción del trabajo..." required class="w-full bg-gray-700 p-3 rounded border-none h-24 focus:ring-2 focus:ring-yellow-500 text-white"></textarea>
                        <button type="submit" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-lg hover:bg-yellow-400 transition">REGISTRAR ENTRADA</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="mb-4">
                    <input type="text" id="buscador" onkeyup="buscarServicio()" placeholder="🔍 Buscar por placa o cliente..." class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 focus:outline-none text-white">
                </div>
                <div id="listaHistorial" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('tallerForm');
        const lista = document.getElementById('listaHistorial');
        document.addEventListener('DOMContentLoaded', cargarDatos);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const registro = {
                id: Date.now(),
                fecha: new Date().toLocaleString(),
                cliente: document.getElementById('cliente').value,
                moto: document.getElementById('moto').value,
                placa: document.getElementById('placa').value.toUpperCase(),
                km: document.getElementById('km').value,
                trabajo: document.getElementById('trabajo').value
            };
            const datos = JSON.parse(localStorage.getItem('taller_kelman') || '[]');
            datos.unshift(registro);
            localStorage.setItem('taller_kelman', JSON.stringify(datos));
            form.reset();
            cargarDatos();
        });

        function cargarDatos() {
            const datos = JSON.parse(localStorage.getItem('taller_kelman') || '[]');
            renderizar(datos);
        }

        function renderizar(datos) {
            lista.innerHTML = datos.map(s => `
                <div class="bg-gray-800 border-l-4 border-yellow-500 p-5 rounded-r-lg shadow flex flex-col md:flex-row justify-between gap-4">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="bg-yellow-500 text-black text-[10px] font-bold px-2 py-0.5 rounded">${s.placa}</span>
                            <span class="text-xs text-gray-500">${s.fecha}</span>
                        </div>
                        <h3 class="font-bold text-lg text-white">${s.cliente} <span class="text-yellow-200/50 text-sm font-normal">| ${s.moto}</span></h3>
                        <p class="text-gray-400 text-sm mt-1 font-mono">${s.km} KM</p>
                        <p class="text-gray-300 mt-2 bg-gray-900/50 p-2 rounded">${s.trabajo}</p>
                    </div>
                    <div class="flex items-center">
                        <button onclick="eliminar(${s.id})" class="text-red-500 hover:text-red-300 text-sm underline">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        function buscarServicio() {
            const filtro = document.getElementById('buscador').value.toUpperCase();
            const datos = JSON.parse(localStorage.getItem('taller_kelman') || '[]');
            const filtrados = datos.filter(d => d.placa.includes(filtro) || d.cliente.toUpperCase().includes(filtro));
            renderizar(filtrados);
        }

        function eliminar(id) {
            if(confirm('¿Borrar este registro?')) {
                let datos = JSON.parse(localStorage.getItem('taller_kelman'));
                datos = datos.filter(d => d.id !== id);
                localStorage.setItem('taller_kelman', JSON.stringify(datos));
                cargarDatos();
            }
        }
    </script>
</body>
</html>
