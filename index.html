<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTOCENTER VILLA HERMOSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ajuste especial para Impresora Térmica 58mm */
        @media print {
            @page { 
                margin: 0; 
                width: 58mm;
            }
            body { 
                background: white !important; 
                color: black !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .no-print { display: none !important; }
            #ticket-imprimir { 
                display: block !important; 
                visibility: visible !important;
                width: 55mm !important; /* Un poco menos de 58mm para dejar margen físico */
                padding: 0;
                margin: 0;
            }
            * { visibility: hidden; }
            #ticket-imprimir, #ticket-imprimir * { visibility: visible; }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4">
    <div class="max-w-5xl mx-auto no-print">
        <header class="py-6 border-b border-gray-700 mb-8 flex justify-between items-center text-white">
            <div>
                <h1 class="text-3xl font-extrabold text-yellow-500 uppercase">MotoCenter</h1>
                <p class="text-gray-400 italic">Villa Hermosa</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-white">
            <div class="lg:col-span-1">
                <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                    <h2 class="text-xl font-bold mb-4">Nuevo Registro</h2>
                    <form id="tallerForm" class="space-y-3">
                        <input type="text" id="cliente" placeholder="Nombre del Cliente" required class="w-full bg-gray-700 p-3 rounded border-none text-white">
                        <input type="tel" id="telefono" placeholder="Teléfono" required class="w-full bg-gray-700 p-3 rounded border-none text-white">
                        <input type="text" id="moto" placeholder="Moto (Pulsar/TVS)" required class="w-full bg-gray-700 p-3 rounded border-none text-white">
                        <input type="text" id="placa" placeholder="Placa" required class="w-full bg-gray-700 p-3 rounded border-none uppercase text-white">
                        <input type="number" id="km" placeholder="Km Actual" required class="w-full bg-gray-700 p-3 rounded border-none text-white">
                        <div class="relative">
                           <span class="absolute left-3 top-3 text-gray-400">Q</span>
                           <input type="number" id="precio" placeholder="Total" required class="w-full bg-gray-700 p-3 pl-8 rounded border-none text-white text-lg font-bold">
                        </div>
                        <textarea id="trabajo" placeholder="Trabajo realizado..." required class="w-full bg-gray-700 p-3 rounded border-none h-20 text-white"></textarea>
                        <button type="submit" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl hover:bg-yellow-400 text-lg uppercase transition-all shadow-lg">Registrar y Guardar</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="mb-4">
                    <input type="text" id="buscador" onkeyup="buscarServicio()" placeholder="🔍 Buscar por placa o cliente..." class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 text-white shadow-inner">
                </div>
                <div id="listaHistorial" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="ticket-imprimir" class="hidden text-black bg-white" style="font-family: 'Courier New', Courier, monospace; line-height: 1.2;"></div>

    <script>
        const form = document.getElementById('tallerForm');
        const lista = document.getElementById('listaHistorial');
        document.addEventListener('DOMContentLoaded', cargarDatos);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const kmActual = parseInt(document.getElementById('km').value);
            const registro = {
                id: Date.now(),
                fecha: new Date().toLocaleString(),
                cliente: document.getElementById('cliente').value,
                telefono: document.getElementById('telefono').value,
                moto: document.getElementById('moto').value,
                placa: document.getElementById('placa').value.toUpperCase(),
                km: kmActual,
                proximoKm: kmActual + 1500,
                precio: document.getElementById('precio').value,
                trabajo: document.getElementById('trabajo').value
            };
            const datos = JSON.parse(localStorage.getItem('taller_kelman') || '[]');
            datos.unshift(registro);
            localStorage.setItem('taller_kelman', JSON.stringify(datos));
            form.reset();
            cargarDatos();
        });

        function cargarDatos() {
            const datos = JSON.parse(localStorage.getItem('taller_kelman') || '[]');
            renderizar(datos);
        }

        function renderizar(datos) {
            lista.innerHTML = datos.map(s => `
                <div class="bg-gray-800 border-l-8 border-yellow-500 p-5 rounded-r-xl shadow-lg flex flex-col md:flex-row justify-between gap-4">
                    <div class="flex-1 text-white">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-yellow-500 text-black text-xs font-black px-2 py-0.5 rounded uppercase">${s.placa}</span>
                            <span class="text-xs text-gray-500 font-mono">${s.fecha}</span>
                        </div>
                        <h3 class="font-bold text-xl uppercase tracking-tight">${s.cliente}</h3>
                        <p class="text-yellow-400 text-sm mb-3">📞 ${s.telefono} | 🏍️ ${s.moto}</p>
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <div class="bg-gray-900/50 p-2 rounded text-center border border-gray-700">
                                <p class="text-[10px] text-gray-500 uppercase">Km Actual</p>
                                <p class="font-bold text-lg">${s.km}</p>
                            </div>
                            <div class="bg-yellow-500/10 p-2 rounded text-center border border-yellow-500/30">
                                <p class="text-[10px] text-yellow-500 uppercase font-bold">Próximo</p>
                                <p class="font-bold text-lg text-yellow-500">${s.proximoKm}</p>
                            </div>
                        </div>
                        <p class="text-gray-300 bg-gray-900/40 p-3 rounded italic text-sm border-l border-gray-600">"${s.trabajo}"</p>
                    </div>
                    <div class="flex flex-col justify-between items-end md:border-l border-gray-700 md:pl-6 min-w-[140px]">
                        <div class="text-right w-full">
                            <p class="text-xs text-gray-500 uppercase font-bold">Total Servicio</p>
                            <p class="text-3xl font-black text-green-400">Q${s.precio}</p>
                        </div>
                        <div class="flex flex-col gap-2 w-full mt-4">
                            <button onclick="imprimirTicket(${s.id})" class="bg-blue-600 hover:bg-blue-500 text-white text-sm py-3 rounded-lg font-black uppercase shadow-md transition-all active:scale-95">🖨️ IMPRIMIR</button>
                            <button onclick="eliminar(${s.id})" class="text-red-500 text-[10px] text-center uppercase tracking-widest hover:text-red-400">Eliminar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function imprimirTicket(id) {
            const datos = JSON.parse(localStorage.getItem('taller_kelman'));
            const s = datos.find(d => d.id === id);
            const ticketArea = document.getElementById('ticket-imprimir');
            
            ticketArea.innerHTML = `
                <div style="width: 100%; text-align: center; color: black !important; padding-top: 5px;">
                    <strong style="font-size: 14px; display: block;">MOTOCENTER</strong>
                    <strong style="font-size: 14px; display: block;">VILLA HERMOSA</strong>
                    <span style="font-size: 10px; display: block; margin-bottom: 5px;">Taller de servicios</span>
                    <span style="display: block; font-size: 10px;">============================</span>
                </div>
                <div style="font-size: 11px; padding: 0 2mm; color: black !important;">
                    <p style="margin: 3px 0;"><strong>FECHA:</strong> ${s.fecha}</p>
                    <p style="margin: 3px 0;"><strong>CLIENTE:</strong> ${s.cliente}</p>
                    <p style="margin: 3px 0;"><strong>TEL:</strong> ${s.telefono}</p>
                    <p style="margin: 3px 0;"><strong>MOTO:</strong> ${s.moto} [${s.placa}]</p>
                    <span style="display: block; font-size: 10px; text-align: center;">----------------------------</span>
                    <p style="margin: 3px 0;"><strong>TRABAJO REALIZADO:</strong><br>${s.trabajo}</p>
                    <span style="display: block; font-size: 10px; text-align: center;">----------------------------</span>
                    <p style="margin: 3px 0;"><strong>KM ENTRADA:</strong> ${s.km}</p>
                    <div style="background: #eee !important; border: 1px dashed black; padding: 4px; margin-top: 5px;">
                        <strong>PROX. CAMBIO: ${s.proximoKm} KM</strong>
                    </div>
                    <div style="text-align: right; margin-top: 10px; font-size: 14px;">
                        <strong>TOTAL: Q${s.precio}</strong>
                    </div>
                    <div style="text-align: center; margin-top: 15px; font-size: 9px;">
                        ¡Gracias por su confianza!<br>Vuelva pronto.
                    </div>
                    <div style="margin-top: 10px;">.</div>
                </div>
            `;
            
            setTimeout(() => {
                window.print();
            }, 600);
        }

        function buscarServicio() {
            const filtro = document.getElementById('buscador').value.toUpperCase();
            const datos = JSON.parse(localStorage.getItem('taller_kelman') || '[]');
            const filtrados = datos.filter(d => 
                d.placa.includes(filtro) || 
                d.cliente.toUpperCase().includes(filtro) ||
                d.telefono.includes(filtro)
            );
            renderizar(filtrados);
        }

        function eliminar(id) {
            if(confirm('¿Deseas eliminar permanentemente este registro?')) {
                let datos = JSON.parse(localStorage.getItem('taller_kelman'));
                datos = datos.filter(d => d.id !== id);
                localStorage.setItem('taller_kelman', JSON.stringify(datos));
                cargarDatos();
            }
        }
    </script>
</body>
</html>
